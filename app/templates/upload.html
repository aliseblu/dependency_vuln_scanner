{% extends "base.html" %}
{% block content %}
<h2>上传依赖文件</h2>
<form method="post" enctype="multipart/form-data" action="/upload">
    <div class="mb-3">
        <label for="file" class="form-label">选择 requirements.txt</label>
        <input class="form-control" type="file" id="file" name="file" required>
    </div>
    <button type="submit" class="btn btn-primary">上传并扫描</button>
</form>
{% if error %}
<div class="alert alert-danger mt-3">{{ error }}</div>
{% endif %}
{% endblock %}
