{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg" style="border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-person-plus-fill text-success" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-2">创建新账户</h3>
                    <span class="badge bg-light text-secondary border mt-1">首个注册用户将自动提权为管理员</span>
                </div>
                <form method="POST" action="/register">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted small fw-bold">设置账号</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="建议使用英文或拼音" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small fw-bold">设置密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-shield-lock"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="至少6位" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 btn-custom rounded-pill fw-bold">立即注册</button>
                </form>
                <div class="mt-4 text-center small text-muted">
                    已有账户？ <a href="/login" class="text-decoration-none fw-bold text-success">返回登录 &larr;</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
