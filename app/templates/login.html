{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-5 col-lg-4">
        <div class="card border-0 shadow-lg" style="border-radius: 15px;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                    <h3 class="fw-bold mt-2">系统登录</h3>
                    <p class="text-muted small">欢迎进入漏洞检测中心</p>
                </div>
                <form method="POST" action="/login">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted small fw-bold">系统账号</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control border-start-0 ps-0" id="username" name="username" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted small fw-bold">访问密码</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-end-0"><i class="bi bi-key"></i></span>
                            <input type="password" class="form-control border-start-0 ps-0" id="password" name="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 btn-custom rounded-pill fw-bold">安全登录</button>
                </form>
                <div class="mt-4 text-center small text-muted">
                    还没有账号？ <a href="/register" class="text-decoration-none fw-bold">快速注册 &rarr;</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
